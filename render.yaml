databases:
  - name: campus-connect-db
    plan: free
    databaseName: campus_connect
    user: campus_user

services:
  - type: web
    name: campus-connect-portal
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: campus-connect-db
          property: connectionString
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false  # Set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: SMTP_FROM_EMAIL
        sync: false  # Set manually in Render dashboard
